
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공정 불량 데시보드</title>
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (엑셀 파싱) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Chart.js (차트 생성) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- 상단 헤더 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                공정 불량 현황 데시보드
            </h1>
            <div id="status-badge" class="px-3 py-1 bg-yellow-100 text-yellow-800 rounded-full text-sm font-medium">
                데이터 로딩 중...
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- 로딩 및 에러 메시지 표시 영역 -->
        <div id="loading-container" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-600">공정불량.xlsx 파일을 불러오고 있습니다...</p>
        </div>

        <div id="error-container" class="hidden bg-red-50 border border-red-200 text-red-700 px-6 py-8 rounded-xl mb-6 text-center shadow-sm">
            <svg class="w-12 h-12 text-red-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <h3 class="text-lg font-bold mb-2">파일을 불러올 수 없습니다.</h3>
            <p id="error-message" class="mb-4">GitHub Pages에 index.html과 동일한 위치에 '공정불량.xlsx' 파일이 있는지 확인해주세요.</p>
            <!-- 로컬 테스트용 수동 업로드 (GitHub Pages에서는 보통 쓰이지 않으나 예비용) -->
            <div class="mt-4 pt-4 border-t border-red-200">
                <p class="text-sm text-red-600 mb-2">수동으로 엑셀 파일을 선택하여 확인할 수도 있습니다:</p>
                <input type="file" id="manual-file-input" accept=".xlsx, .xls" class="block w-full max-w-sm mx-auto text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-100 file:text-red-700 hover:file:bg-red-200"/>
            </div>
        </div>

        <!-- 데시보드 컨텐츠 (데이터 파싱 완료 후 표시됨) -->
        <div id="dashboard-container" class="hidden space-y-6">
            
            <!-- KPI 요약 카드 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100">
                    <h3 class="text-slate-500 text-sm font-medium mb-1">총 생산 수량 (Total Prodc. Qty)</h3>
                    <div class="text-3xl font-bold text-slate-800" id="kpi-prodc">-</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100">
                    <h3 class="text-slate-500 text-sm font-medium mb-1">총 불량 수량 (Total Deft. Qty)</h3>
                    <div class="text-3xl font-bold text-red-600" id="kpi-deft">-</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100">
                    <h3 class="text-slate-500 text-sm font-medium mb-1">평균 불량률 (Deft. Rate ppm)</h3>
                    <div class="text-3xl font-bold text-orange-500" id="kpi-rate">-</div>
                </div>
            </div>

            <!-- 차트 영역 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- 날짜별 불량률 추이 (선 차트) -->
                <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-4">일자별 종합 불량률 추이</h3>
                    <div class="relative h-72">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <!-- 증상별 불량 수량 (막대 차트) -->
                <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-4">불량 증상별 수량 (Total)</h3>
                    <div class="relative h-72">
                        <canvas id="symptomChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 데이터 테이블 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-slate-800">상세 데이터</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-slate-600" id="data-table">
                        <thead class="text-xs text-slate-700 bg-slate-50 border-b border-slate-200 whitespace-nowrap">
                            <tr id="table-head">
                                <!-- JS로 채워짐 -->
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- JS로 채워짐 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const FILE_URL = './공정불량.xlsx';
        let trendChartInstance = null;
        let symptomChartInstance = null;

        // 초기 실행: 자동 파일 로드
        document.addEventListener('DOMContentLoaded', () => {
            loadExcelFile(FILE_URL);
            
            // 수동 업로드 이벤트 리스너 연결
            document.getElementById('manual-file-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        processExcelData(e.target.result);
                    };
                    reader.readAsArrayBuffer(file);
                }
            });
        });

        // 엑셀 파일 Fetch
        async function loadExcelFile(url) {
            try {
                const response = await fetch(url, { cache: 'no-store' });
                if (!response.ok) throw new Error('Network response was not ok.');
                const arrayBuffer = await response.arrayBuffer();
                processExcelData(arrayBuffer);
            } catch (error) {
                console.error("파일 로드 에러:", error);
                showError("서버에서 '공정불량.xlsx' 파일을 찾을 수 없습니다.");
            }
        }

        // 엑셀 데이터 파싱 및 렌더링
        function processExcelData(arrayBuffer) {
            try {
                // SheetJS로 읽기
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // 2차원 배열 형태로 추출 (빈 셀은 null/undefined로 유지)
                const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                if (rawData.length < 4) {
                    throw new Error("데이터 구조가 예상과 다릅니다. (최소 4행 이상 필요)");
                }

                // 1. 헤더 파싱
                const headers = rawData[0]; // ['불량증상', '구분', 'Total', '날짜1', '날짜2' ...]
                const dateHeaders = headers.slice(3).filter(h => h); // 3번째 인덱스부터 날짜
                
                // 2. 본문 파싱 (3행 단위)
                const parsedData = [];
                let currentSymptom = "알수없음";

                // i=1부터 시작, 3행씩 건너뜀 (1: Prodc, 2: Deft, 3: Rate)
                for (let i = 1; i < rawData.length; i += 3) {
                    const row1 = rawData[i];   // Prodc. Qty 행
                    if (!row1 || row1.length === 0) continue;
                    
                    // 병합된 첫 셀의 값을 유지 (비어있으면 이전 값 사용)
                    if (row1[0] && row1[0].toString().trim() !== "") {
                        currentSymptom = row1[0].toString().trim();
                    }

                    const row2 = rawData[i + 1] || []; // Deft. Qty 행
                    const row3 = rawData[i + 2] || []; // Deft. Rate 행

                    const symptomData = {
                        symptom: currentSymptom,
                        prodcTotal: parseFloat(row1[2]) || 0,
                        deftTotal: parseFloat(row2[2]) || 0,
                        rateTotal: parseFloat(row3[2]) || 0,
                        daily: {}
                    };

                    // 날짜별 데이터 매핑
                    dateHeaders.forEach((date, idx) => {
                        const colIdx = 3 + idx;
                        symptomData.daily[date] = {
                            prodc: parseFloat(row1[colIdx]) || 0,
                            deft: parseFloat(row2[colIdx]) || 0,
                            rate: parseFloat(row3[colIdx]) || 0
                        };
                    });

                    parsedData.push(symptomData);
                }

                // 3. 데시보드 렌더링
                renderDashboard(parsedData, dateHeaders, rawData);

                // UI 상태 변경
                document.getElementById('loading-container').classList.add('hidden');
                document.getElementById('error-container').classList.add('hidden');
                document.getElementById('dashboard-container').classList.remove('hidden');
                
                const badge = document.getElementById('status-badge');
                badge.className = "px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm font-medium";
                badge.innerText = "데이터 로드 완료";

            } catch (error) {
                console.error("데이터 파싱 에러:", error);
                showError("엑셀 데이터를 분석하는 중 오류가 발생했습니다. 파일 형식을 확인해주세요.");
            }
        }

        // 데시보드 UI 업데이트
        function renderDashboard(parsedData, dateHeaders, rawData) {
            // --- 1. KPI 요약 계산 ---
            // 여러 증상 간 중복 생산량이 있을 수 있으므로 Total 합산을 주의.
            // 보통 엑셀상 'Total' 행이 따로 있거나 첫번째 행이 합계일 수 있으나,
            // 여기서는 각 증상별 데이터를 합산하여 전체 통계를 도출함. (엑셀 구성에 따라 조정 필요)
            let totalProdc = 0;
            let totalDeft = 0;
            
            parsedData.forEach(item => {
                // 만약 첫번째 증상이 "Total"이나 "합계" 라면 그것만 사용하도록 분기처리 가능.
                // 일단 모두 합산하는 로직. (중복합산 우려시 엑셀 양식 확인 요망)
                if(item.symptom.toLowerCase().includes('total') || item.symptom === '합계') {
                    totalProdc = item.prodcTotal;
                    totalDeft = item.deftTotal;
                }
            });

            // "합계" 행이 없다면 전부 더함.
            if(totalProdc === 0) {
                totalProdc = parsedData.reduce((sum, item) => sum + item.prodcTotal, 0);
                totalDeft = parsedData.reduce((sum, item) => sum + item.deftTotal, 0);
            }
            
            const overallRate = totalProdc > 0 ? ((totalDeft / totalProdc) * 1000000).toFixed(0) : 0;

            document.getElementById('kpi-prodc').innerText = totalProdc.toLocaleString();
            document.getElementById('kpi-deft').innerText = totalDeft.toLocaleString();
            document.getElementById('kpi-rate').innerText = overallRate.toLocaleString();

            // --- 2. 차트 데이터 준비 ---
            
            // 일자별 총 생산/불량 집계 (선 차트용)
            const dailyTrends = dateHeaders.map(date => {
                let dProdc = 0;
                let dDeft = 0;
                parsedData.forEach(item => {
                    // 합계 행 중복 방지
                    if(!(item.symptom.toLowerCase().includes('total') || item.symptom === '합계')) {
                        dProdc += item.daily[date]?.prodc || 0;
                        dDeft += item.daily[date]?.deft || 0;
                    }
                });
                const dRate = dProdc > 0 ? (dDeft / dProdc) * 1000000 : 0;
                return dRate;
            });

            // 증상별 불량 수량 (막대 차트용 - 합계 행 제외)
            const symptomNames = [];
            const symptomDeftValues = [];
            
            parsedData.forEach(item => {
                if(!(item.symptom.toLowerCase().includes('total') || item.symptom === '합계')) {
                    symptomNames.push(item.symptom);
                    symptomDeftValues.push(item.deftTotal);
                }
            });

            // --- 3. 차트 그리기 ---
            drawTrendChart(dateHeaders, dailyTrends);
            drawSymptomChart(symptomNames, symptomDeftValues);

            // --- 4. 데이터 테이블 렌더링 ---
            renderTable(rawData);
        }

        // 트렌드 차트 (선 그래프)
        function drawTrendChart(labels, data) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChartInstance) trendChartInstance.destroy();

            trendChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '불량률 (ppm)',
                        data: data,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#3b82f6',
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 증상별 불량 차트 (막대 그래프)
        function drawSymptomChart(labels, data) {
            const ctx = document.getElementById('symptomChart').getContext('2d');
            if (symptomChartInstance) symptomChartInstance.destroy();

            trendChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '불량 수량',
                        data: data,
                        backgroundColor: '#ef4444',
                        borderRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 하단 상세 데이터 테이블 (병합된 형태를 텍스트로 풀어 출력)
        function renderTable(rawData) {
            const headContainer = document.getElementById('table-head');
            const bodyContainer = document.getElementById('table-body');
            
            headContainer.innerHTML = '';
            bodyContainer.innerHTML = '';

            if(rawData.length === 0) return;

            // 헤더 렌더링
            const headers = rawData[0];
            headers.forEach(h => {
                const th = document.createElement('th');
                th.className = "px-6 py-3 font-semibold text-slate-700";
                th.innerText = h || '';
                headContainer.appendChild(th);
            });

            // 본문 렌더링 (병합셀 시각화 유지)
            let currentSymptom = "";
            for (let i = 1; i < rawData.length; i++) {
                const row = rawData[i];
                if (!row || row.length === 0) continue;

                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 hover:bg-slate-50";

                // 불량증상 (인덱스 0)
                const td0 = document.createElement('td');
                td0.className = "px-6 py-2 font-medium text-slate-800";
                
                // 3행 중 첫행에만 값이 있으므로, 있으면 저장, 없으면 이전값(CSS로 흐리게 처리)
                if (row[0]) {
                    currentSymptom = row[0];
                    td0.innerText = currentSymptom;
                } else {
                    td0.innerText = currentSymptom;
                    td0.classList.add('text-slate-300'); // 병합된 아래 셀들은 흐리게
                }
                tr.appendChild(td0);

                // 나머지 데이터 셀들
                for(let j = 1; j < headers.length; j++) {
                    const td = document.createElement('td');
                    td.className = "px-6 py-2";
                    
                    let val = row[j] !== undefined ? row[j] : '';
                    // 숫자인 경우 콤마 포맷 적용
                    if(!isNaN(val) && val !== '') {
                        val = Number(val).toLocaleString();
                    }
                    
                    // 구분 컬럼 색상 처리
                    if(j === 1) {
                        if(val.includes('Prodc')) td.classList.add('text-slate-600');
                        if(val.includes('Deft. Qty')) td.classList.add('text-red-500');
                        if(val.includes('Rate')) td.classList.add('text-orange-500');
                    } else if (j >= 2) {
                        td.classList.add('text-right'); // 숫자는 우측 정렬
                    }

                    td.innerText = val;
                    tr.appendChild(td);
                }
                bodyContainer.appendChild(tr);
            }
        }

        // 에러 UI 표시
        function showError(msg) {
            document.getElementById('loading-container').classList.add('hidden');
            document.getElementById('dashboard-container').classList.add('hidden');
            const errorContainer = document.getElementById('error-container');
            errorContainer.classList.remove('hidden');
            document.getElementById('error-message').innerText = msg;
            
            const badge = document.getElementById('status-badge');
            badge.className = "px-3 py-1 bg-red-100 text-red-800 rounded-full text-sm font-medium";
            badge.innerText = "데이터 로드 실패";
        }

    </script>
</body>
</html>
